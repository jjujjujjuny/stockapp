<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>머루다래증권</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:      #06060e;
  --card:    #0c0c1e;
  --card2:   #101028;
  --primary: #00d9f5;
  --pri-bg:  rgba(0,217,245,0.12);
  --text:    #e8e8f8;
  --muted:   #9090c0;
  --border:  #22224a;
  --green:   #1effc4;
  --red:     #ff3d71;
  --yellow:  #ffd166;
  --radius:  14px;
  --shadow:  0 4px 24px rgba(0,0,0,0.7);
  --glow-c:  rgba(0,217,245,0.3);
  --glow-p:  rgba(168,85,247,0.3);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* 브라우저 폼 요소를 다크 모드로 강제 */
html { color-scheme: dark; }
input, select, textarea, button { color-scheme: dark; font-family: inherit; }
option { background: #101028; color: #e8e8f8; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Noto Sans KR', sans-serif;
  background: var(--bg);
  background-image:
    radial-gradient(ellipse at 15% 50%, rgba(0,217,245,0.05) 0%, transparent 60%),
    radial-gradient(ellipse at 85% 15%, rgba(168,85,247,0.05) 0%, transparent 55%);
  color: var(--text);
  min-height: 100vh; -webkit-font-smoothing: antialiased;
}

/* ── Header ── */
.header {
  position: sticky; top: 0; z-index: 50;
  background: rgba(6,6,14,0.92);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.header h1 { font-size: 17px; font-weight: 700; color: var(--primary); text-shadow: 0 0 14px var(--glow-c); }
.header-right { display: flex; align-items: center; gap: 8px; }
.refresh-btn {
  background: none; border: none; font-size: 20px;
  cursor: pointer; padding: 4px; border-radius: 50%; line-height: 1;
  transition: background 0.15s;
}
.refresh-btn:active { background: var(--card2); }
.last-updated { font-size: 11px; color: var(--muted); }

/* ── Tab bar ── */
.tab-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: rgba(8,8,18,0.96);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  display: flex; padding-bottom: env(safe-area-inset-bottom, 0);
}
.tab-btn {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; padding: 8px 2px 6px;
  cursor: pointer; color: var(--muted);
  font-size: 10px; gap: 2px;
  border: none; background: none; transition: color 0.2s, text-shadow 0.2s;
}
.tab-btn.active { color: var(--primary); text-shadow: 0 0 10px var(--glow-c); }
.tab-icon { font-size: 22px; line-height: 1; }

/* ── Pages ── */
.page { display: none; padding: 16px; padding-bottom: 90px; max-width: 520px; margin: 0 auto; }
.page.active { display: block; }

/* ── Cards ── */
.card {
  background: var(--card);
  border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
  border: 1px solid var(--border);
  box-shadow: 0 4px 24px rgba(0,0,0,0.45);
}
.card-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; font-weight: 500; }
.card-value { font-size: 26px; font-weight: 800; color: var(--text); }
.card-sub   { font-size: 13px; color: var(--muted); margin-top: 4px; }

.total-card {
  background: linear-gradient(135deg, #08082a 0%, #110830 100%);
  border: 1px solid rgba(0,217,245,0.35);
  box-shadow: 0 0 32px rgba(0,217,245,0.12), 0 0 64px rgba(168,85,247,0.08),
              inset 0 0 40px rgba(0,217,245,0.04);
}
.total-card .card-label { color: rgba(212,212,232,0.55); }
.total-card .card-value { color: #fff; font-size: 30px; text-shadow: 0 0 20px var(--glow-c); }
.total-card .card-sub   { color: rgba(212,212,232,0.6); }

/* ── Chart ── */
.chart-wrap { position: relative; height: 200px; }
.chart-legend { display: flex; flex-wrap: wrap; gap: 6px 10px; margin-top: 12px; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; }
.legend-dot  { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 6px currentColor; }

/* ── Asset list ── */
.asset-item {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 0; border-bottom: 1px solid var(--border);
}
.asset-item:last-child { border-bottom: none; }
.asset-dot   { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 6px currentColor; }
.asset-info  { flex: 1; min-width: 0; }
.asset-name  { font-size: 13px; font-weight: 700; line-height: 1.3; color: var(--text); }
.asset-meta  { font-size: 11px; color: var(--muted); margin-top: 2px; }
.asset-right { text-align: right; flex-shrink: 0; }
.asset-value { font-size: 14px; font-weight: 700; color: var(--text); }
.asset-pct   { font-size: 11px; margin-top: 2px; }
.badge-usd   { display: inline-block; font-size: 9px; font-weight: 700; background: rgba(0,217,245,0.12); color: var(--primary); padding: 1px 5px; border-radius: 4px; margin-left: 4px; vertical-align: middle; border: 1px solid rgba(0,217,245,0.25); }

/* ── Progress bars ── */
.progress-row   { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
.progress-label { font-size: 11px; color: var(--muted); width: 80px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.progress-wrap  { flex: 1; background: var(--border); border-radius: 4px; height: 8px; position: relative; overflow: visible; }
.progress-fill  { height: 100%; border-radius: 4px; transition: width 0.5s; }
.progress-tick  { position: absolute; top: -3px; bottom: -3px; width: 2px; background: var(--primary); border-radius: 2px; box-shadow: 0 0 6px var(--glow-c); }
.progress-pct   { font-size: 10px; width: 50px; text-align: right; flex-shrink: 0; color: var(--muted); }

/* ── Section title / Divider ── */
.section-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; color: var(--text); }
.divider { height: 1px; background: var(--border); margin: 10px 0; }

/* ── Dividend ── */
.div-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
.div-row:last-child { border-bottom: none; }
.div-row-label { font-size: 13px; font-weight: 600; color: var(--text); }
.div-row-sub   { font-size: 11px; color: var(--muted); margin-top: 2px; }
.div-amount    { font-size: 15px; font-weight: 700; color: var(--green); text-shadow: 0 0 8px rgba(30,255,196,0.4); }

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.two-col .card { margin-bottom: 0; }

/* ── Rebalancer ── */
.input-group  { margin-bottom: 14px; }
.input-label  { font-size: 13px; color: var(--muted); margin-bottom: 6px; display: block; font-weight: 500; }
.num-input {
  width: 100%; padding: 12px; font-size: 16px;
  border: 1.5px solid var(--border); border-radius: 10px;
  outline: none; color: var(--text); background: var(--card2);
  transition: border-color 0.2s, box-shadow 0.2s;
}
.num-input:focus { border-color: var(--primary); box-shadow: 0 0 10px var(--glow-c); }
.presets { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.preset-btn {
  padding: 5px 12px; border: 1.5px solid var(--border);
  border-radius: 20px; font-size: 12px; cursor: pointer;
  background: var(--card2); color: var(--text); transition: all 0.15s;
}
.preset-btn.sel { background: var(--pri-bg); border-color: var(--primary); color: var(--primary); box-shadow: 0 0 8px var(--glow-c); }
.rb-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.rb-table th { text-align: left; padding: 8px 4px; color: var(--muted); font-weight: 600; font-size: 11px; border-bottom: 2px solid var(--border); }
.rb-table td { padding: 10px 4px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.rb-table tr:last-child td { border-bottom: none; }
.shares-buy  { font-size: 18px; font-weight: 800; color: var(--primary); text-shadow: 0 0 10px var(--glow-c); }
.shares-zero { color: var(--muted); }
.summary-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; }
.summary-label { font-size: 13px; color: var(--muted); }
.summary-value { font-size: 14px; font-weight: 700; color: var(--text); }

/* ── Goal ── */
.goal-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
.goal-row:last-child { border-bottom: none; }
.goal-label { font-size: 13px; color: var(--muted); }
.goal-value { font-size: 14px; font-weight: 700; color: var(--text); }

/* ── Buttons ── */
.btn {
  width: 100%; padding: 14px; border: none; border-radius: 12px;
  font-size: 15px; font-weight: 700; cursor: pointer;
  transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
}
.btn:active   { opacity: 0.85; transform: scale(0.98); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-primary {
  background: transparent; color: var(--primary);
  border: 1.5px solid var(--primary);
  box-shadow: 0 0 16px var(--glow-c), inset 0 0 16px rgba(0,217,245,0.06);
  text-shadow: 0 0 8px var(--glow-c);
}
.btn-primary:active { background: rgba(0,217,245,0.1); box-shadow: 0 0 28px var(--glow-c); }
.btn-success {
  background: transparent; color: var(--green);
  border: 1.5px solid var(--green);
  box-shadow: 0 0 16px rgba(30,255,196,0.25), inset 0 0 16px rgba(30,255,196,0.05);
  text-shadow: 0 0 8px rgba(30,255,196,0.5);
}
.btn-success:active { background: rgba(30,255,196,0.1); }
.btn-outline {
  background: transparent; color: var(--primary);
  border: 1.5px solid rgba(0,217,245,0.45);
}
.btn-outline:active { background: var(--pri-bg); }

/* ── Settings ── */
.text-input {
  width: 100%; padding: 12px; font-size: 13px;
  border: 1.5px solid var(--border); border-radius: 10px;
  outline: none; color: var(--text); font-family: inherit;
  background: var(--card2);
  transition: border-color 0.2s, box-shadow 0.2s;
}
.text-input:focus { border-color: var(--primary); box-shadow: 0 0 10px var(--glow-c); }
.settings-section { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--primary); opacity: 0.7; margin-bottom: 10px; }
.div-setting-row { padding: 12px 0; border-bottom: 1px solid var(--border); }
.div-setting-row:last-of-type { border-bottom: none; }
.div-setting-name { font-size: 14px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
.div-setting-sub  { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
.div-setting-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.small-input {
  padding: 8px; border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 14px; outline: none; width: 100%;
  color: var(--text); background: var(--card2);
  transition: border-color 0.2s, box-shadow 0.2s;
}
.small-input:focus { border-color: var(--primary); box-shadow: 0 0 8px var(--glow-c); }
.month-checks { display: flex; flex-wrap: wrap; gap: 4px 8px; }
.month-checks label { display: flex; align-items: center; gap: 3px; font-size: 11px; cursor: pointer; }

/* ── Portfolio editor ── */
.ticker-row { display: flex; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.ticker-row:last-child { border-bottom: none; }
.ticker-badge { font-size: 11px; font-weight: 700; background: rgba(0,217,245,0.1); color: var(--primary); padding: 3px 8px; border-radius: 6px; flex-shrink: 0; min-width: 62px; text-align: center; font-family: monospace; border: 1px solid rgba(0,217,245,0.25); }
.ticker-name-cell { flex: 1; min-width: 0; font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pct-input { width: 62px; padding: 6px 8px; font-size: 14px; font-weight: 700; border: 1.5px solid var(--border); border-radius: 8px; text-align: right; outline: none; color: var(--text); background: var(--card2); transition: border-color 0.2s, box-shadow 0.2s; }
.pct-input:focus { border-color: var(--primary); box-shadow: 0 0 8px var(--glow-c); }
.pct-label { font-size: 13px; color: var(--muted); flex-shrink: 0; }
.del-btn { background: none; border: none; font-size: 16px; cursor: pointer; color: var(--muted); padding: 4px 6px; border-radius: 6px; flex-shrink: 0; line-height: 1; transition: color 0.15s; }
.del-btn:active { color: var(--red); }
.total-indicator { padding: 10px 14px; border-radius: 10px; font-size: 13px; font-weight: 700; text-align: center; margin-top: 12px; border: 1px solid; }
.total-ok { background: rgba(30,255,196,0.08); color: var(--green); border-color: rgba(30,255,196,0.3); }
.total-ng { background: rgba(255,61,113,0.08); color: var(--red); border-color: rgba(255,61,113,0.3); }
.add-ticker-form { display: flex; gap: 8px; margin-top: 4px; }
.add-ticker-form .num-input { flex: 1; font-size: 14px; padding: 10px 12px; }

/* ── States ── */
.center-state { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 200px; gap: 14px; text-align: center; color: var(--muted); }
.spinner { width: 36px; height: 36px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.7s linear infinite; box-shadow: 0 0 12px var(--glow-c); }
@keyframes spin { to { transform: rotate(360deg); } }
.error-icon { font-size: 40px; }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 90px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--card); color: var(--text);
  border: 1px solid var(--primary);
  padding: 10px 20px; border-radius: 24px; font-size: 14px;
  opacity: 0; transition: all 0.25s; z-index: 200;
  white-space: nowrap; pointer-events: none;
  box-shadow: 0 0 20px var(--glow-c);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Exchange rate bar ── */
.rate-bar { background: rgba(0,217,245,0.07); border-bottom: 1px solid rgba(0,217,245,0.15); color: var(--primary); font-size: 12px; font-weight: 600; padding: 6px 16px; text-align: center; }

/* ── Colors ── */
.ok    { color: var(--green); }
.over  { color: var(--yellow); }
.under { color: var(--red); }
.hidden { display: none !important; }

/* ── Cat decoration ── */
.cat-decoration {
  position: fixed;
  bottom: 58px; /* 탭바 위 */
  right: -8px;
  width: 130px;
  pointer-events: none;
  z-index: 90;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.18));
  animation: cat-float 4s ease-in-out infinite;
}
@keyframes cat-float {
  0%, 100% { transform: translateY(0px); }
  50%       { transform: translateY(-6px); }
}
</style>

const fmt = {
  krw:  n => Math.round(n).toLocaleString('ko-KR') + '원',
  krwC: n => n >= 1e8 ? (n / 1e8).toFixed(2) + '억원'
           : n >= 1e4 ? Math.floor(n / 1e4).toLocaleString() + '만원'
           : Math.round(n).toLocaleString('ko-KR') + '원',
  pct:      n   => n.toFixed(1) + '%',
  pctClass: (cur, tgt) => { const d = Math.abs(cur - tgt); return d <= 2 ? 'ok' : d <= 5 ? 'over' : 'under'; },
  date: iso => {
    if (!iso) return '-';
    const d = new Date(iso);

};

// ════════════════════════════════════════════════════════════════
// DOM HELPER — innerHTML 없이 안전하게 DOM 생성
// ════════════════════════════════════════════════════════════════
// boolean 속성은 property로, 나머지는 setAttribute
const BOOL_ATTRS = new Set(['checked', 'selected', 'disabled', 'multiple', 'required']);

function h(tag, props, ...children) {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(props || {})) {
    if (v == null) continue;
    if      (k === 'class')      el.className = v;
    else if (k === 'style')      Object.assign(el.style, v);
    else if (BOOL_ATTRS.has(k))  el[k] = Boolean(v);
    else                         el.setAttribute(k, v);
  }
  appendChildren(el, children);
  return el;
}

function appendChildren(parent, children) {
  for (const child of children.flat(Infinity)) {
    if (child == null || child === false) continue;
    parent.append(
      typeof child === 'string' || typeof child === 'number'
        ? document.createTextNode(String(child))
        : child
    );
  }
}

/** 기존 자식 모두 제거 후 새 자식 삽입 */
function setChildren(parent, ...children) {
  parent.replaceChildren();
  appendChildren(parent, children);
}

const $id = id => document.getElementById(id);

    if (data) url += '&data=' + encodeURIComponent(JSON.stringify(data));
    const res  = await fetch(url, { redirect: 'follow' });
    const json = await res.json();
    if (!json.success) throw new Error(json.error || '서버 오류');
    return json.data;
  },

  // 중복 요청 방지: 진행 중이면 같은 Promise 반환
  getPortfolio() {
    if (!this._inflight) {
      this._inflight = this._get('getPortfolio')
        .finally(() => { this._inflight = null; });
    }
    return this._inflight;
  },

  updateHoldings: data => api._get('updateHoldings', data),
  setHoldings:    data => api._get('setHoldings',    data),
  updateConfig:   data => api._get('updateConfig',   data),
};

// 종목명 캐시 + 조회
// ════════════════════════════════════════════════════════════════
let nameCache = JSON.parse(localStorage.getItem('tickerNames') || '{}');

async function lookupStockName(ticker) {
  if (nameCache[ticker]) return nameCache[ticker];
  const isKorean = /^\d/.test(ticker);
  const yTicker  = isKorean ? ticker + '.KS' : ticker.toUpperCase();
  try {
    const res = await fetch(
      `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(yTicker)}?range=1d&interval=1d`
    );
    if (!res.ok) return null;
    const data = await res.json();
    const meta = data.chart?.result?.[0]?.meta;
    const name = meta?.shortName || meta?.longName || null;
    if (name) {
      nameCache[ticker] = name;
      localStorage.setItem('tickerNames', JSON.stringify(nameCache));
    }
    return name;
  } catch {
    return null;
  }
}

function applyCustomPortfolio(portfolio) {
  const cp = state.customPortfolio;
  if (!cp) return portfolio;
  const assets = portfolio.assets.map(a => {
    const custom = cp.find(c => c.ticker === a.ticker);
    if (!custom) return a;
    return { ...a, target_pct: custom.target_pct, name: custom.name || a.name };
  });
  return { ...portfolio, assets };
}

// ════════════════════════════════════════════════════════════════
// CHART — 인스턴스 재사용 (destroy 하지 않음)
// ════════════════════════════════════════════════════════════════
let _chart = null;

function syncChart(assets) {
  const canvas = $id('pie-chart');
  if (!canvas) return;

  // renderHome()이 DOM을 재생성하면 캔버스가 교체됨.
  // 이전 차트가 다른 캔버스를 가리키고 있으면 destroy 후 새로 만들어야 함.
  if (_chart && _chart.canvas !== canvas) {
    _chart.destroy();
    _chart = null;
  }

  const data = {
    labels: assets.map(a => a.name),
    datasets: [
      {
        data: assets.map(a => a.value > 0 ? a.value : 0.0001),
        backgroundColor: COLORS,
        borderWidth: 2, borderColor: '#0c0c1e',
      },
      {
        data: assets.map(a => a.target_pct),
        backgroundColor: COLORS.map(c => c + '40'),
        borderWidth: 0, weight: 0.45,
      },
    ],
  };

  if (_chart) {
    // 기존 인스턴스 데이터만 교체 — DOM 건드리지 않음
    _chart.data = data;
    _chart.update('none');
  } else {
    _chart = new Chart(canvas, {
      type: 'doughnut',
      data,
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: '52%',
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#0c0c1e',
            borderColor: 'rgba(0,217,245,0.3)',
            borderWidth: 1,
            titleColor: '#00d9f5',
            bodyColor: '#d4d4e8',
            callbacks: {
              label: ctx => ctx.datasetIndex === 0
                ? ` 현재 ${fmt.pct(assets[ctx.dataIndex].current_pct)} (목표 ${assets[ctx.dataIndex].target_pct}%)`
                : ` 목표 ${assets[ctx.dataIndex].target_pct}%`,
            },
          },
        },
      },
    });
  }
}

// RENDER — 활성 탭만 렌더링
// ════════════════════════════════════════════════════════════════
function render() {
  // 마지막 업데이트 시각
  $id('last-updated').textContent = state.portfolio
    ? fmt.date(state.portfolio.last_updated) : '-';

  // 환율 바
  const rateBar = $id('rate-bar');
  if (state.portfolio?.usdkrw) {
    rateBar.textContent = `💱 USD/KRW ${state.portfolio.usdkrw.toLocaleString('ko-KR')}원 (실시간)`;
    rateBar.classList.remove('hidden');
  } else {
    rateBar.classList.add('hidden');
  }

  // 탭 버튼 active 표시
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === state.activeTab);
  });

  // 페이지 show/hide
  document.querySelectorAll('.page').forEach(p => {
    p.classList.toggle('active', p.id === 'page-' + state.activeTab);
  });

  // 활성 페이지 렌더
  const renderers = {
    home:      renderHome,
    dividend:  renderDividend,
    rebalance: renderRebalance,
    goal:      renderGoal,
    settings:  renderSettings,
    portfolio: renderPortfolioEditor,
  };
  renderers[state.activeTab]?.();

  // 홈일 때 차트 동기화 (canvas가 DOM에 있어야 하므로 RAF 한 박자 뒤)
  if (state.activeTab === 'home' && state.portfolio?.assets) {
    requestAnimationFrame(() => syncChart(state.portfolio.assets));
  }
}

// ── DIVIDEND ─────────────────────────────────────────────────────
function renderDividend() {
  const el = $id('page-dividend');
  if (!state.portfolio) { setChildren(el, noDataMsg()); return; }

  const { assets } = state.portfolio;
  const now    = new Date();
  const thisM  = now.getMonth() + 1;
  const nextM  = thisM === 12 ? 1 : thisM + 1;
  const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  const monthDiv  = m => assets.reduce((s, a) => s + (a.div_months.includes(m) ? a.shares * a.div_per_share : 0), 0);
  const annual    = assets.reduce((s, a) => s + a.shares * a.div_per_share * a.div_months.length, 0);
  const monthly   = annual / 12;
  const noPayers  = assets.every(a => a.div_per_share === 0);

  const calendarRows = Array.from({ length: 12 }, (_, i) => {
    const m      = i + 1;
    const amt    = monthDiv(m);
    const payers = assets.filter(a => a.div_months.includes(m) && a.div_per_share > 0);
    const mark   = m === thisM ? ' ← 이번달' : m === nextM ? ' ← 다음달' : '';
    const isThis = m === thisM;

    return h('div', { class: 'div-row' },
      h('div', {},
        h('div', { class: 'div-row-label', style: isThis ? { color: 'var(--primary)' } : {} }, MONTHS[i] + mark),
        h('div', { class: 'div-row-sub' },
          payers.length
            ? payers.map(a => `${a.name.split(' ').pop()}(${a.shares}주×${fmt.krw(a.div_per_share)})`).join(', ')
            : '배당 없음',
        ),
      ),
      h('div', { class: 'div-amount' }, amt > 0 ? fmt.krw(amt) : '-'),
    );
  });

  setChildren(el,
    // 연간 총합
    h('div', { class: 'card total-card' },
      h('div', { class: 'card-label' }, '연간 예상 배당금 (원화)'),
      h('div', { class: 'card-value' }, fmt.krw(annual)),
      h('div', { class: 'card-sub'   }, `월 평균 ${fmt.krwC(monthly)}`),
    ),

    // 이번달 / 다음달 요약
    h('div', { class: 'two-col' },
      h('div', { class: 'card' },
        h('div', { class: 'card-label' }, `이번 달 (${thisM}월)`),
        h('div', { style: { fontSize: '18px', fontWeight: '800', color: 'var(--green)' } }, fmt.krwC(monthDiv(thisM))),
        h('div', { class: 'card-sub' },
          assets.filter(a => a.div_months.includes(thisM) && a.div_per_share > 0).map(a => a.ticker).join(', ') || '해당없음',
        ),
      ),
      h('div', { class: 'card' },
        h('div', { class: 'card-label' }, `다음 달 (${nextM}월)`),
        h('div', { style: { fontSize: '18px', fontWeight: '800', color: 'var(--green)' } }, fmt.krwC(monthDiv(nextM))),
        h('div', { class: 'card-sub' },
          assets.filter(a => a.div_months.includes(nextM) && a.div_per_share > 0).map(a => a.ticker).join(', ') || '해당없음',
        ),
      ),
    ),

    // 월별 캘린더
    h('div', { class: 'card' },
      h('div', { class: 'section-title' }, '월별 배당 일정'),
      ...calendarRows,
    ),

    noPayers
      ? h('div', { class: 'card', style: { textAlign: 'center', color: 'var(--muted)', fontSize: '13px' } },
          '⚙️ 설정 탭에서 주당 배당금을 입력하면 배당금이 계산됩니다.',
        )
      : null,
  );
}

function syncGoalResult() {
  const el = $id('goal-result');
  if (!el || !state.portfolio) return;

  const { assets, total_value } = state.portfolio;
  const targetMonthly = state.goalAmount;
  if (!targetMonthly || targetMonthly <= 0) return;

  let weightedYield = 0;
  assets.forEach(a => {
    if (a.price > 0 && a.div_per_share > 0 && a.div_months.length > 0) {
      weightedYield += (a.target_pct / 100) * (a.div_per_share * a.div_months.length / a.price);
    }
  });

  if (weightedYield <= 0) {
    setChildren(el,
      h('div', { class: 'card', style: { textAlign: 'center', color: 'var(--muted)', fontSize: '13px', padding: '24px' } },
        '⚙️ 설정 탭에서 주당 배당금을 입력해주세요.',
      ),
    );
    el.classList.remove('hidden');
    return;
  }

  const targetAnnual    = targetMonthly * 12;
  const currentAnnual   = assets.reduce((s, a) => s + a.shares * a.div_per_share * a.div_months.length, 0);
  const currentMonthly  = currentAnnual / 12;
  const requiredTotal   = targetAnnual / weightedYield;
  const additionalNeeded = Math.max(0, requiredTotal - total_value);
  const progressPct     = Math.min(total_value / requiredTotal * 100, 100);

  setChildren(el,
    h('div', { class: 'card total-card' },
      h('div', { class: 'card-label' }, '목표 월 배당금'),
      h('div', { class: 'card-value' }, fmt.krw(targetMonthly)),
      h('div', { class: 'card-sub'   }, `연 ${fmt.krwC(targetAnnual)}`),
    ),
    h('div', { class: 'card' },
      h('div', { class: 'card-label', style: { marginBottom: '10px' } }, `달성률 ${progressPct.toFixed(1)}%`),
      h('div', { style: { background: 'var(--border)', borderRadius: '8px', height: '14px', overflow: 'hidden', marginBottom: '16px' } },
        h('div', { style: { height: '100%', width: `${progressPct}%`, background: 'linear-gradient(90deg,var(--green),var(--primary))', borderRadius: '8px', transition: 'width 0.6s' } }),
      ),
      h('div', { class: 'goal-row' }, h('div', { class: 'goal-label' }, '현재 총 자산'),             h('div', { class: 'goal-value' }, fmt.krwC(total_value))),
      h('div', { class: 'goal-row' }, h('div', { class: 'goal-label' }, '현재 월 배당금 (평균)'),    h('div', { class: 'goal-value', style: { color: 'var(--green)'   } }, fmt.krw(currentMonthly))),
      h('div', { class: 'divider' }),
      h('div', { class: 'goal-row' }, h('div', { class: 'goal-label' }, '목표 달성 필요 총 자산'),   h('div', { class: 'goal-value', style: { color: 'var(--primary)' } }, fmt.krwC(requiredTotal))),
      h('div', { class: 'goal-row' },
        h('div', { class: 'goal-label' }, '추가 필요 자산'),
        h('div', { class: 'goal-value', style: { color: additionalNeeded > 0 ? 'var(--red)' : 'var(--green)' } },
          additionalNeeded > 0 ? fmt.krwC(additionalNeeded) : '목표 달성! 🎉',
        ),
      ),
      h('div', { class: 'goal-row' }, h('div', { class: 'goal-label' }, '포트폴리오 가중 배당수익률'), h('div', { class: 'goal-value' }, `${(weightedYield * 100).toFixed(2)}%`)),
    ),
  );
  el.classList.remove('hidden');
}

async function fetchPortfolio() {
  if (state.loading) return;
  setState({ loading: true, error: null });
  try {
    let portfolio = await api.getPortfolio();
    // 커스텀 포트폴리오 오버라이드 (target_pct, name)
    portfolio = applyCustomPortfolio(portfolio);
    // 캐시된 이름 적용
    portfolio.assets = portfolio.assets.map(a => ({
      ...a,
      name: nameCache[a.ticker] || a.name,
    }));
    setState({ portfolio, loading: false });

    // 백그라운드: 캐시 없는 종목 이름 조회 후 갱신
    const toLookup = portfolio.assets.filter(a => !nameCache[a.ticker]);
    if (toLookup.length > 0) {
      Promise.all(toLookup.map(a => lookupStockName(a.ticker))).then(() => {
        if (!state.portfolio) return;
        const enriched = state.portfolio.assets.map(a => ({
          ...a,
          name: nameCache[a.ticker] || a.name,
        }));
        setState({ portfolio: { ...state.portfolio, assets: enriched } });
      });
    }
  } catch (e) {
    setState({ loading: false, error: e.message });
  }
}

async function saveHoldings() {
  if (!state.gasUrl) { showToast('먼저 GAS URL을 저장해주세요.'); return; }
  const assets = state.portfolio?.assets?.length ? state.portfolio.assets : DEFAULT_ASSETS;

  const updates = assets.map(a => ({
    ticker: a.ticker,
    shares: parseFloat($id(`shares-${a.ticker}`)?.value) || 0,
  }));

  try {
    await api.setHoldings(updates);
    showToast('✅ 수량이 저장됐습니다.');
    await fetchPortfolio();
  } catch (e) {
    showToast('❌ 저장 실패: ' + e.message, 4000);
  }
}

function computePlan(assets, totalValue, budget) {
  const newTotal = totalValue + budget;
  const items    = assets.map(a => ({
    ...a,
    gap:          Math.max(0, a.target_pct / 100 * newTotal - a.value),
    sharesToBuy:  0,
    buyAmountKRW: 0,
  }));

  const totalGap = items.reduce((s, i) => s + i.gap, 0);
  const scale    = totalGap > budget ? budget / totalGap : 1;
  let remaining  = budget;

  // 1차: 비례 배분 floor
  items.forEach(item => {
    if (item.price <= 0) return;
    const shares       = Math.floor(item.gap * scale / item.price);
    item.sharesToBuy   = shares;
    item.buyAmountKRW  = shares * item.price;
    remaining         -= item.buyAmountKRW;
  });

  // 2차: 잔여 현금으로 가장 부족한 종목 1주씩 추가 (greedy)
  let changed = true;
  while (changed && remaining > 0) {
    changed = false;
    let bestItem = null, bestDist = -Infinity;
    for (const item of items) {
      if (item.price <= 0 || item.price > remaining) continue;
      const newPct = (item.value + item.buyAmountKRW + item.price) / newTotal * 100;
      const dist   = item.target_pct - newPct;
      if (dist > bestDist) { bestDist = dist; bestItem = item; }
    }
    if (bestItem && bestDist > -0.5) {
      bestItem.sharesToBuy++;
      bestItem.buyAmountKRW += bestItem.price;
      remaining -= bestItem.price;
      changed = true;
    }
  }

  const actualSpent    = budget - remaining;
  const actualNewTotal = totalValue + actualSpent;
  items.forEach(item => {
    item.newValue = item.value + item.buyAmountKRW;
    item.newPct   = actualNewTotal > 0 ? item.newValue / actualNewTotal * 100 : 0;
  });

  return { items, remaining, actualSpent, newTotal: actualNewTotal };
}

async function applyPurchase() {
  const { rbPlan } = state;
  if (!rbPlan) return;

  const updates = rbPlan.items
    .filter(i => i.sharesToBuy > 0)
    .map(i => ({ ticker: i.ticker, addShares: i.sharesToBuy }));
  if (!updates.length) return;

  const btn = $id('apply-btn');
  if (btn) { btn.disabled = true; btn.textContent = '저장 중...'; }

  try {
    await api.updateHoldings(updates);
    showToast('✅ 매수 완료! 포트폴리오가 업데이트됐습니다.');
    setState({ rbPlan: null, activeTab: 'home' });
    await fetchPortfolio();
  } catch (e) {
    showToast('❌ 저장 실패: ' + e.message, 4000);
    if (btn) { btn.disabled = false; btn.textContent = '✅ 이대로 매수 완료 — 포트폴리오에 반영'; }
  }
}

// ════════════════════════════════════════════════════════════════
// EVENT DELEGATION — 단일 리스너로 모든 클릭 처리
// ════════════════════════════════════════════════════════════════
$id('app').addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;

  switch (btn.dataset.action) {

    case 'tab':
      setState({ activeTab: btn.dataset.tab });
      break;

    case 'refresh':
      fetchPortfolio();
      break;

    case 'go-settings':
      setState({ activeTab: 'settings' });
      break;

    case 'rb-preset': {
      const v = Number(btn.dataset.value);
      const plan = state.portfolio
        ? computePlan(state.portfolio.assets, state.portfolio.total_value, v)
        : null;
      setState({ rbAmount: v, rbPlan: plan });
      break;
    }

    case 'calc-rebalance': {
      const amount = parseFloat($id('rb-amount')?.value);
      if (!amount || amount <= 0) { showToast('투자금액을 입력해주세요.'); break; }
      const plan = computePlan(state.portfolio.assets, state.portfolio.total_value, amount);
      setState({ rbAmount: amount, rbPlan: plan });
      break;
    }

    case 'goal-preset': {
      const v = Number(btn.dataset.value);
      setState({ goalAmount: v });
      break;
    }

    case 'calc-goal': {
      const amount = parseFloat($id('goal-amount')?.value);
      if (!amount || amount <= 0) break;
      setState({ goalAmount: amount });
      break;
    }

    case 'apply-purchase':
      applyPurchase();
      break;

    case 'save-holdings':
      saveHoldings();
      break;

    case 'save-gas-url':
      saveGasUrl();
      break;

    case 'save-div-settings':
      saveDivSettings();
      break;

    case 'save-portfolio':
      savePortfolioSettings();
      break;

    case 'add-ticker':
      addTicker();
      break;

    case 'remove-ticker':
      removeTicker(btn.dataset.idx);
      break;
  }
});

// ════════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════════
render();
if (state.gasUrl) fetchPortfolio();

</script>
