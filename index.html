<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>머루다래증권</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:         #07071a;
  --card:       #0d0d20;
  --card2:      #141428;
  --primary:    #00d9f5;
  --pri-bg:     rgba(0,217,245,0.09);
  --text:       #ededf8;
  --muted:      rgba(237,237,248,0.38);
  --border:     rgba(255,255,255,0.07);
  --border2:    rgba(255,255,255,0.12);
  --green:      #00e08a;
  --red:        #ff4560;
  --yellow:     #ffb020;
  --radius:     16px;
  --shadow:     0 1px 3px rgba(0,0,0,0.4);
  --header-bg:  rgba(7,7,26,0.94);
  --nav-bg:     rgba(7,7,26,0.97);
}
[data-theme="light"] {
  --bg:         #f4f4f8;
  --card:       #ffffff;
  --card2:      #eeeef4;
  --pri-bg:     rgba(0,180,210,0.09);
  --text:       #111120;
  --muted:      rgba(17,17,32,0.42);
  --border:     rgba(0,0,0,0.07);
  --border2:    rgba(0,0,0,0.13);
  --primary:    #009ab5;
  --green:      #00a86b;
  --red:        #e03050;
  --yellow:     #d08800;
  --header-bg:  rgba(244,244,248,0.94);
  --nav-bg:     rgba(244,244,248,0.97);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { color-scheme: dark; }
html[data-theme="light"] { color-scheme: light; }
input, select, textarea, button { color-scheme: dark; font-family: inherit; }
html[data-theme="light"] input,
html[data-theme="light"] select,
html[data-theme="light"] textarea,
html[data-theme="light"] button { color-scheme: light; }
option { background: #141428; color: #ededf8; }
html[data-theme="light"] option { background: #ffffff; color: #111120; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh; -webkit-font-smoothing: antialiased;
}

/* ── Header ── */
.header {
  position: sticky; top: 0; z-index: 50;
  background: var(--header-bg);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  height: 52px;
  display: flex; align-items: center; justify-content: space-between;
}
.header h1 { font-size: 16px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; }
.header h1 img { border-radius: 6px !important; border: none !important; opacity: 0.9; }
.header-right { display: flex; align-items: center; gap: 10px; }
.refresh-btn {
  background: none; border: none; font-size: 16px;
  cursor: pointer; padding: 6px; border-radius: 8px; line-height: 1;
  color: var(--muted);
  transition: background 0.15s, color 0.15s;
}
.refresh-btn:active { background: var(--card2); color: var(--text); }
.last-updated { font-size: 11px; color: var(--muted); }

/* ── Tab bar ── */
.tab-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: var(--nav-bg);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex; padding-bottom: env(safe-area-inset-bottom, 0);
}
.tab-btn {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; padding: 10px 2px 8px;
  cursor: pointer; color: var(--muted);
  font-size: 10px; gap: 3px; letter-spacing: 0.2px;
  border: none; background: none; transition: color 0.2s;
}
.tab-btn.active { color: var(--primary); }
.tab-icon { font-size: 20px; line-height: 1; }

/* ── Pages ── */
.page { display: none; padding: 16px 16px 100px; max-width: 520px; margin: 0 auto; }
.page.active { display: block; }

/* ── Cards ── */
.card {
  background: var(--card);
  border-radius: var(--radius); padding: 20px; margin-bottom: 8px;
  border: 1px solid var(--border);
}
.card-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 500; letter-spacing: 0.3px; }
.card-value { font-size: 28px; font-weight: 700; color: var(--text); line-height: 1.1; }
.card-sub   { font-size: 13px; color: var(--muted); margin-top: 6px; }

.total-card {
  background: linear-gradient(145deg, #0c0c22 0%, #0f0a2a 100%);
  border-color: rgba(0,217,245,0.14);
}
[data-theme="light"] .total-card {
  background: linear-gradient(145deg, #e8f4f8 0%, #dde8f0 100%);
  border-color: rgba(0,154,181,0.2);
}
[data-theme="light"] .total-card .card-value { color: #111120; }
.total-card .card-label { color: var(--muted); }
.total-card .card-value { color: #fff; font-size: 32px; font-weight: 700; }
.total-card .card-sub   { color: var(--muted); }

/* ── Chart ── */
.chart-wrap { position: relative; height: 190px; }
.chart-legend { display: flex; flex-wrap: wrap; gap: 6px 14px; margin-top: 14px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
.legend-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ── Asset list ── */
.asset-item {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 0; border-bottom: 1px solid var(--border);
}
.asset-item:last-child { border-bottom: none; }
.asset-dot   { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.asset-info  { flex: 1; min-width: 0; }
.asset-name  { font-size: 14px; font-weight: 600; line-height: 1.3; color: var(--text); }
.asset-meta  { font-size: 11px; color: var(--muted); margin-top: 3px; }
.asset-right { text-align: right; flex-shrink: 0; }
.asset-value { font-size: 14px; font-weight: 700; color: var(--text); }
.asset-pct   { font-size: 11px; margin-top: 3px; color: var(--muted); }
.badge-usd   { display: inline-block; font-size: 9px; font-weight: 600; background: var(--pri-bg); color: var(--primary); padding: 1px 5px; border-radius: 4px; margin-left: 4px; vertical-align: middle; }

/* ── Progress bars ── */
.progress-row   { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.progress-label { font-size: 11px; color: var(--muted); width: 82px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.progress-wrap  { flex: 1; background: var(--card2); border-radius: 3px; height: 5px; position: relative; overflow: hidden; }
.progress-fill  { height: 100%; border-radius: 3px; transition: width 0.5s; }
.progress-tick  { position: absolute; top: 0; bottom: 0; width: 2px; background: rgba(255,255,255,0.35); border-radius: 2px; }
.progress-pct   { font-size: 11px; width: 54px; text-align: right; flex-shrink: 0; color: var(--muted); }

/* ── Section title / Divider ── */
.section-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: var(--text); letter-spacing: -0.1px; }
.divider { height: 1px; background: var(--border); margin: 12px 0; }

/* ── Dividend ── */
.div-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
.div-row:last-child { border-bottom: none; }
.div-row-label { font-size: 13px; font-weight: 600; color: var(--text); }
.div-row-sub   { font-size: 11px; color: var(--muted); margin-top: 2px; }
.div-amount    { font-size: 14px; font-weight: 700; color: var(--green); }

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.two-col .card { margin-bottom: 0; }

/* ── Rebalancer ── */
.input-group  { margin-bottom: 16px; }
.input-label  { font-size: 12px; color: var(--muted); margin-bottom: 7px; display: block; font-weight: 500; }
.num-input {
  width: 100%; padding: 12px 14px; font-size: 16px;
  border: 1px solid var(--border2); border-radius: 10px;
  outline: none; color: var(--text); background: var(--card2);
  transition: border-color 0.2s;
}
.num-input:focus { border-color: var(--primary); }
.presets { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.preset-btn {
  padding: 6px 13px; border: 1px solid var(--border2);
  border-radius: 20px; font-size: 12px; cursor: pointer;
  background: var(--card2); color: var(--muted); transition: all 0.15s;
}
.preset-btn.sel { background: var(--pri-bg); border-color: var(--primary); color: var(--primary); }
.rb-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.rb-table th { text-align: left; padding: 8px 4px; color: var(--muted); font-weight: 500; font-size: 11px; border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.4px; }
.rb-table td { padding: 11px 4px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.rb-table tr:last-child td { border-bottom: none; }
.shares-buy  { font-size: 18px; font-weight: 700; color: var(--primary); }
.shares-zero { color: var(--muted); }
.summary-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; }
.summary-label { font-size: 13px; color: var(--muted); }
.summary-value { font-size: 14px; font-weight: 700; color: var(--text); }

/* ── Goal ── */
.goal-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
.goal-row:last-child { border-bottom: none; }
.goal-label { font-size: 13px; color: var(--muted); }
.goal-value { font-size: 14px; font-weight: 700; color: var(--text); }

/* ── Buttons ── */
.btn {
  width: 100%; padding: 14px; border: none; border-radius: 12px;
  font-size: 15px; font-weight: 600; cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  letter-spacing: 0.1px;
}
.btn:active   { opacity: 0.8; transform: scale(0.99); }
.btn:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-primary {
  background: var(--primary); color: #000;
}
.btn-primary:active { opacity: 0.85; }
.btn-success {
  background: var(--green); color: #000;
}
.btn-success:active { opacity: 0.85; }
.btn-outline {
  background: var(--card2); color: var(--text);
  border: 1px solid var(--border2);
}
.btn-outline:active { background: var(--card); }

/* ── Settings ── */
.text-input {
  width: 100%; padding: 12px 14px; font-size: 13px;
  border: 1px solid var(--border2); border-radius: 10px;
  outline: none; color: var(--text); font-family: inherit;
  background: var(--card2);
  transition: border-color 0.2s;
}
.text-input:focus { border-color: var(--primary); }
.settings-section { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 14px; }
.div-setting-row { padding: 12px 0; border-bottom: 1px solid var(--border); }
.div-setting-row:last-of-type { border-bottom: none; }
.div-setting-name { font-size: 14px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
.div-setting-sub  { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
.div-setting-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.small-input {
  padding: 9px 10px; border: 1px solid var(--border2); border-radius: 8px;
  font-size: 14px; outline: none; width: 100%;
  color: var(--text); background: var(--card2);
  transition: border-color 0.2s;
}
.small-input:focus { border-color: var(--primary); }
.month-checks { display: flex; flex-wrap: wrap; gap: 4px 10px; }
.month-checks label { display: flex; align-items: center; gap: 4px; font-size: 12px; cursor: pointer; color: var(--muted); }

/* ── Portfolio editor ── */
.ticker-row { display: flex; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.ticker-row:last-child { border-bottom: none; }
.ticker-badge { font-size: 10px; font-weight: 700; background: var(--pri-bg); color: var(--primary); padding: 3px 8px; border-radius: 6px; flex-shrink: 0; min-width: 62px; text-align: center; font-family: monospace; }
.ticker-name-cell { flex: 1; min-width: 0; font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pct-input { width: 62px; padding: 6px 8px; font-size: 14px; font-weight: 600; border: 1px solid var(--border2); border-radius: 8px; text-align: right; outline: none; color: var(--text); background: var(--card2); transition: border-color 0.2s; }
.pct-input:focus { border-color: var(--primary); }
.pct-label { font-size: 13px; color: var(--muted); flex-shrink: 0; }
.del-btn { background: none; border: none; font-size: 16px; cursor: pointer; color: var(--muted); padding: 4px 6px; border-radius: 6px; flex-shrink: 0; line-height: 1; transition: color 0.15s; }
.del-btn:active { color: var(--red); }
.total-indicator { padding: 10px 14px; border-radius: 10px; font-size: 13px; font-weight: 700; text-align: center; margin-top: 12px; border: 1px solid; }
.total-ok { background: rgba(30,255,196,0.08); color: var(--green); border-color: rgba(30,255,196,0.3); }
.total-ng { background: rgba(255,61,113,0.08); color: var(--red); border-color: rgba(255,61,113,0.3); }
.add-ticker-form { display: flex; gap: 8px; margin-top: 4px; }
.add-ticker-form .num-input { flex: 1; font-size: 14px; padding: 10px 12px; }

/* ── Portfolio editor (확장) ── */
.ticker-row { flex-direction: column; align-items: stretch; gap: 0; }
.ticker-row-top { display: flex; align-items: center; gap: 8px; }
.ticker-row-bottom { display: flex; align-items: center; gap: 6px; padding: 6px 0 0 70px; flex-wrap: wrap; }
.field-label { font-size: 11px; color: var(--muted); flex-shrink: 0; }
.avg-input {
  width: 100px; padding: 6px 8px; font-size: 14px; font-weight: 600;
  border: 1px solid var(--border2); border-radius: 8px; text-align: right;
  outline: none; color: var(--text); background: var(--card2);
  transition: border-color 0.2s;
}
.avg-input:focus { border-color: var(--primary); }

/* ── Total card 원금/평가금/수익률 ── */
.total-stats {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  margin-top: 16px; padding-top: 14px;
  border-top: 1px solid var(--border);
}
.total-stat-item { text-align: center; }
.total-stat-item + .total-stat-item { border-left: 1px solid var(--border); }
.total-stat-label { font-size: 10px; color: var(--muted); margin-bottom: 4px; letter-spacing: 0.4px; }
.total-stat-value { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.9); line-height: 1.2; }
.total-stat-value.positive { color: var(--green); }
.total-stat-value.negative { color: var(--red); }
/* 실제 입금액 기준 요약 라인 */
.cash-return-row {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 10px; padding-top: 10px;
  border-top: 1px solid var(--border);
}
.cash-return-label { font-size: 11px; color: var(--muted); }
.cash-return-value { font-size: 13px; font-weight: 700; }
.cash-return-value.positive { color: var(--green); }
.cash-return-value.negative { color: var(--red); }

/* ── States ── */
.center-state { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 200px; gap: 14px; text-align: center; color: var(--muted); }
.spinner { width: 32px; height: 32px; border: 2px solid var(--border2); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-icon { font-size: 36px; }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 88px; left: 50%;
  transform: translateX(-50%) translateY(6px);
  background: var(--card2); color: var(--text);
  border: 1px solid var(--border2);
  padding: 10px 20px; border-radius: 24px; font-size: 13px;
  opacity: 0; transition: all 0.2s; z-index: 200;
  white-space: nowrap; pointer-events: none;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Exchange rate bar ── */
.rate-bar { background: var(--card); border-bottom: 1px solid var(--border); color: var(--muted); font-size: 11px; font-weight: 500; padding: 5px 16px; text-align: center; letter-spacing: 0.3px; }

/* ── Colors ── */
.ok    { color: var(--green); }
.over  { color: var(--yellow); }
.under { color: var(--red); }
.hidden { display: none !important; }


/* ── Dividend history ── */
.div-sync-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.div-sync-status { font-size: 11px; color: var(--muted); line-height: 1.4; }
.sync-btn {
  background: var(--card2); border: 1px solid var(--border2); border-radius: 8px;
  padding: 6px 12px; font-size: 12px; color: var(--muted); cursor: pointer;
  transition: all 0.15s; flex-shrink: 0;
}
.sync-btn:active { border-color: var(--primary); color: var(--primary); }
.div-ticker-hist { padding-top: 14px; margin-top: 14px; border-top: 1px solid var(--border); }
.div-ticker-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
.div-ticker-title { font-size: 13px; font-weight: 700; color: var(--text); }
.div-ticker-latest { font-size: 12px; color: var(--primary); font-weight: 700; }
.div-hist-scroll { display: flex; gap: 7px; overflow-x: auto; padding-bottom: 6px; -webkit-overflow-scrolling: touch; }
.div-hist-scroll::-webkit-scrollbar { height: 3px; }
.div-hist-scroll::-webkit-scrollbar-track { background: transparent; }
.div-hist-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.div-hist-item {
  flex-shrink: 0; text-align: center; padding: 8px 10px;
  border-radius: 8px; background: var(--card2);
  border: 1px solid var(--border); min-width: 64px;
}
.div-hist-item.is-latest {
  border-color: rgba(0,217,245,0.2); background: rgba(0,217,245,0.05);
}
.div-hist-ym   { font-size: 10px; color: var(--muted); margin-bottom: 3px; }
.div-hist-amt  { font-size: 12px; font-weight: 700; color: var(--text); }
.div-hist-item.is-latest .div-hist-amt { color: var(--primary); }
.div-hist-trend { font-size: 9px; margin-top: 3px; }
.div-hist-trend.up { color: var(--green); }
.div-hist-trend.dn { color: var(--red); }
.div-hist-trend.eq { color: var(--muted); }
.next-div-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
.next-div-label { font-size: 11px; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.3px; }
.next-div-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
.next-div-name { font-size: 12px; color: var(--muted); }
.next-div-amt  { font-size: 13px; font-weight: 600; color: var(--green); }
</style>

<meta name="apple-mobile-web-app-status-bar-style" content="default">

</head>
<body>

const fmt = {
  krw:  n => Math.round(n).toLocaleString('ko-KR') + '원',
  krwC: n => n >= 1e8 ? (n / 1e8).toFixed(2) + '억원'
           : n >= 1e4 ? Math.floor(n / 1e4).toLocaleString() + '만원'
           : Math.round(n).toLocaleString('ko-KR') + '원',
  pct:      n   => n.toFixed(1) + '%',
  pctClass: (cur, tgt) => { const d = Math.abs(cur - tgt); return d <= 2 ? 'ok' : d <= 5 ? 'over' : 'under'; },

    if (!iso) return '-';
    const d = new Date(iso);

};

// DOM HELPER — innerHTML 없이 안전하게 DOM 생성
// ════════════════════════════════════════════════════════════════
// boolean 속성은 property로, 나머지는 setAttribute
const BOOL_ATTRS = new Set(['checked', 'selected', 'disabled', 'multiple', 'required']);

function h(tag, props, ...children) {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(props || {})) {
    if (v == null) continue;
    if      (k === 'class')      el.className = v;
    else if (k === 'style')      Object.assign(el.style, v);
    else if (BOOL_ATTRS.has(k))  el[k] = Boolean(v);
    else                         el.setAttribute(k, v);
  }
  appendChildren(el, children);
  return el;
}

function appendChildren(parent, children) {
  for (const child of children.flat(Infinity)) {
    if (child == null || child === false) continue;
    parent.append(
      typeof child === 'string' || typeof child === 'number'
        ? document.createTextNode(String(child))
        : child
    );
  }
}

/** 기존 자식 모두 제거 후 새 자식 삽입 */
function setChildren(parent, ...children) {
  parent.replaceChildren();
  appendChildren(parent, children);
}

const api = {
  _inflight: null,

  async _get(action, data = null) {
    if (!state.gasUrl) throw new Error('GAS URL이 설정되지 않았습니다.');
    let url = state.gasUrl + '?action=' + action;
    if (data) url += '&data=' + encodeURIComponent(JSON.stringify(data));
    const res  = await fetch(url, { redirect: 'follow' });
    const json = await res.json();
    if (!json.success) throw new Error(json.error || '서버 오류');
    return json.data;
  },

  // 중복 요청 방지: 진행 중이면 같은 Promise 반환
  getPortfolio() {
    if (!this._inflight) {
      this._inflight = this._get('getPortfolio')
        .finally(() => { this._inflight = null; });
    }
    return this._inflight;
  },

  updateHoldings: data => api._get('updateHoldings', data),
  setHoldings:    data => api._get('setHoldings',    data),
  updateConfig:   data => api._get('updateConfig',   data),
  saveUserData:   data => api._get('saveUserData',   data),
};

async function lookupStockName(ticker) {
  // 1순위: 내장 이름 맵 (코드상 수정된 이름을 무조건 최우선 적용)
  // 이렇게 해야 캐시나 API 결과에 상관없이 내가 수정한 이름이 즉시 반영됩니다.
  if (KR_NAMES[ticker]) {
    return KR_NAMES[ticker]; 
  }

  // 2순위: 로컬 캐시 (이미 한 번 찾았던 이름)
  if (nameCache[ticker]) return nameCache[ticker];

  const isKorean = /^\d/.test(ticker);
  const yTicker  = isKorean ? ticker + '.KS' : ticker.toUpperCase();

  // 3순위: Yahoo Finance Search API
  try {
    const res = await fetch(
      `https://query1.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(yTicker)}&quotesCount=5&newsCount=0&listsCount=0`,
      { signal: AbortSignal.timeout(4000) }
    );
    if (res.ok) {
      const data = await res.json();
      const match = (data.quotes || []).find(
        q => q.symbol?.toUpperCase() === yTicker.toUpperCase()
      ) || data.quotes?.[0];
      
      let name = match?.shortname || match?.longname;
      if (name) {
        // 한국 종목인데 Yahoo에서 가져왔다면 이름 다듬기 (선택사항)
        if (isKorean) name = name.replace(/ ETF$/i, ''); 
        
        nameCache[ticker] = name;
        localStorage.setItem('tickerNames', JSON.stringify(nameCache));
        return name;
      }
    }
  } catch(e) { console.error("Search API Error", e); }

  // (이후 Chart API 로직은 동일하게 유지...)
  return ticker; // 이름 못 찾으면 티커라도 반환
}

function applyCustomPortfolio(portfolio) {
  const cp = state.customPortfolio;
  if (!cp) return portfolio;
  
  const assets = portfolio.assets.map(a => {
    const custom = cp.find(c => c.ticker === a.ticker);
    if (!custom) return a;
    // GAS(네이버 실시간) → KR_NAMES(내장 맵) → 커스텀 이름 순으로 우선 적용
    const correctedName = a.name || KR_NAMES[a.ticker] || custom.name;
    return { ...a, target_pct: custom.target_pct, name: correctedName, avg_price: custom.avg_price || a.avg_price || 0 };
  });
  return { ...portfolio, assets };
}

// ════════════════════════════════════════════════════════════════
// CHART — 인스턴스 재사용 (destroy 하지 않음)
// ════════════════════════════════════════════════════════════════
let _chart = null;

function syncChart(assets) {
  const canvas = $id('pie-chart');
  if (!canvas) return;

  // renderHome()이 DOM을 재생성하면 캔버스가 교체됨.
  // 이전 차트가 다른 캔버스를 가리키고 있으면 destroy 후 새로 만들어야 함.
  if (_chart && _chart.canvas !== canvas) {
    _chart.destroy();
    _chart = null;
  }

  const data = {
    labels: assets.map(a => a.name),
    datasets: [
      {
        data: assets.map(a => a.value > 0 ? a.value : 0.0001),
        backgroundColor: COLORS,
        borderWidth: 2, borderColor: '#0d0d20',
      },
      {
        data: assets.map(a => a.target_pct),
        backgroundColor: COLORS.map(c => c + '40'),
        borderWidth: 0, weight: 0.45,
      },
    ],
  };

  if (_chart) {
    // 기존 인스턴스 데이터만 교체 — DOM 건드리지 않음
    _chart.data = data;
    _chart.update('none');
  } else {
    _chart = new Chart(canvas, {
      type: 'doughnut',
      data,
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: '52%',
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#141428',
            borderColor: 'rgba(255,255,255,0.08)',
            borderWidth: 1,
            titleColor: '#ededf8',
            bodyColor: 'rgba(237,237,248,0.55)',
            callbacks: {
              label: ctx => ctx.datasetIndex === 0
                ? ` 현재 ${fmt.pct(assets[ctx.dataIndex].current_pct)} (목표 ${assets[ctx.dataIndex].target_pct}%)`
                : ` 목표 ${assets[ctx.dataIndex].target_pct}%`,
            },
          },
        },
      },
    });
  }
}

// RENDER — 활성 탭만 렌더링
// ════════════════════════════════════════════════════════════════
function render() {
  // 마지막 업데이트 시각
  $id('last-updated').textContent = state.portfolio
    ? fmt.date(state.portfolio.last_updated) : '-';

  // 환율 바
  const rateBar = $id('rate-bar');
  if (state.portfolio?.usdkrw) {
    rateBar.textContent = `💱 USD/KRW ${state.portfolio.usdkrw.toLocaleString('ko-KR')}원 (실시간)`;
    rateBar.classList.remove('hidden');
  } else {
    rateBar.classList.add('hidden');
  }

  // 탭 버튼 active 표시
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === state.activeTab);
  });

  // 페이지 show/hide
  document.querySelectorAll('.page').forEach(p => {
    p.classList.toggle('active', p.id === 'page-' + state.activeTab);
  });

  // 활성 페이지 렌더
  const renderers = {
    home:      renderHome,
    dividend:  renderDividend,
    rebalance: renderRebalance,
    goal:      renderGoal,
    settings:  renderSettings,
    portfolio: renderPortfolioEditor,
  };
  renderers[state.activeTab]?.();

  // 홈일 때 차트 동기화 (canvas가 DOM에 있어야 하므로 RAF 한 박자 뒤)
  if (state.activeTab === 'home' && state.portfolio?.assets) {
    requestAnimationFrame(() => syncChart(state.portfolio.assets));
  }
}

        h('div', { class: 'total-stat-item' },

        ),
        h('div', { class: 'total-stat-item' },
          h('div', { class: 'total-stat-label' }, '평가 손익'),
          h('div', { class: `total-stat-value ${retCls}` }, `${retSign}${fmt.krwC(profit)}`),
        ),
        h('div', { class: 'total-stat-item' },
          h('div', { class: 'total-stat-label' }, '수익률'),
          h('div', { class: `total-stat-value ${retCls}` }, `${retSign}${returnPct.toFixed(2)}%`),

      hasCashReturn ? h('div', { class: 'cash-return-row' },

      ) : null,
    ),

    h('div', { class: 'card' },

      h('div', { class: 'chart-wrap' }, h('canvas', { id: 'pie-chart' })),

        ...assets.map((a, i) =>

// ── DIVIDEND ─────────────────────────────────────────────────────
function renderDividend() {
  const el = $id('page-dividend');
  if (!state.portfolio) { setChildren(el, noDataMsg()); return; }

  const { assets } = state.portfolio;
  const now   = new Date();
  const thisM = now.getMonth() + 1;
  const thisY = now.getFullYear();
  const nextM = thisM === 12 ? 1 : thisM + 1;
  const nextY = thisM === 12 ? thisY + 1 : thisY;
  const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  // divHistory 우선, 없으면 GAS 값으로 계산
  const monthDiv = m => assets.reduce((s, a) => {
    const months = getEffDivMonths(a);
    if (!months.includes(m)) return s;
    // 이 월의 가장 최근 실적 찾기
    const hist = state.divHistory[a.ticker];
    if (hist && hist.length > 0) {
      const sameMonth = hist.filter(h => parseInt(h.ym.split('-')[1]) === m);
      const amt = sameMonth.length > 0
        ? sameMonth[sameMonth.length - 1].amount
        : hist[hist.length - 1].amount;
      return s + a.shares * toKrw(amt, a);
    }
    return s + a.shares * toKrw(a.div_per_share, a);
  }, 0);

  const annual  = assets.reduce((s, a) => {
    const months = getEffDivMonths(a);
    return s + a.shares * toKrw(getEffDivPerShare(a), a) * months.length;
  }, 0);
  const monthly  = annual / 12;
  const noPayers = assets.every(a => getEffDivPerShare(a) === 0);

  // 다음 배당 예정 (향후 3개월 이내 지급 종목)
  const upcomingItems = [];
  assets.forEach(a => {
    const months = getEffDivMonths(a);
    const divps  = getEffDivPerShare(a);
    if (!months.length || !divps) return;
    // 이번달 포함 다음 3개월 탐색
    for (let offset = 0; offset <= 3; offset++) {
      const m = ((thisM - 1 + offset) % 12) + 1;
      if (!months.includes(m)) continue;
      const y = thisY + (thisM - 1 + offset >= 12 ? 1 : 0);
      const ym = `${y}-${String(m).padStart(2,'0')}`;
      // 이미 실제 기록이 있는 달은 "확정", 없으면 "예정"
      const hist = state.divHistory[a.ticker];
      const confirmed = hist?.some(h => h.ym === ym);
      const sameMonthHist = hist?.filter(h => parseInt(h.ym.split('-')[1]) === m) || [];
      const expectedAmt = sameMonthHist.length > 0
        ? sameMonthHist[sameMonthHist.length - 1].amount
        : divps;
      upcomingItems.push({ a, m, y, ym, confirmed, expectedAmt });
      break;
    }
  });
  upcomingItems.sort((x, y) => x.ym.localeCompare(y.ym));

  // 이번달/다음달 금액
  const thisMonthTotal = monthDiv(thisM);
  const nextMonthTotal = monthDiv(nextM);

  // 월별 캘린더 행
  const calendarRows = Array.from({ length: 12 }, (_, i) => {
    const m      = i + 1;
    const amt    = monthDiv(m);
    const payers = assets.filter(a => {
      const months = getEffDivMonths(a);
      return months.includes(m) && getEffDivPerShare(a) > 0;
    });
    const mark   = m === thisM ? ' ← 이번달' : m === nextM ? ' ← 다음달' : '';
    const isThis = m === thisM;
    return h('div', { class: 'div-row' },
      h('div', {},
        h('div', { class: 'div-row-label', style: isThis ? { color: 'var(--primary)' } : {} }, MONTHS[i] + mark),
        h('div', { class: 'div-row-sub' },
          payers.length
            ? payers.map(a => {
                const hist = state.divHistory[a.ticker];
                const sameM = hist?.filter(h => parseInt(h.ym.split('-')[1]) === m) || [];
                const perShare = sameM.length > 0 ? sameM[sameM.length-1].amount : getEffDivPerShare(a);
                const dispAmt = a.currency === 'USD' ? `$${perShare.toFixed(3)}` : fmt.krw(perShare);
                return `${a.name.split(' ').pop()}(${a.shares}주×${dispAmt})`;
              }).join(', ')
            : '배당 없음',
        ),
      ),
      h('div', { class: 'div-amount' }, amt > 0 ? fmt.krw(amt) : '-'),
    );
  });

  // 종목별 배당 기록 카드 (divHistory 있는 종목만)
  const histCards = assets.map(a => {
    const hist = state.divHistory[a.ticker];
    if (!hist || hist.length === 0) return null;
    const last8 = hist.slice(-8);
    const items = last8.map((entry, i) => {
      const prev = last8[i - 1];
      const trend = !prev ? 'eq'
        : entry.amount > prev.amount + 0.001 ? 'up'
        : entry.amount < prev.amount - 0.001 ? 'dn' : 'eq';
      const icon  = trend === 'up' ? '▲' : trend === 'dn' ? '▼' : '─';
      const isLatest = i === last8.length - 1;
      const dispAmt = a.currency === 'USD'
        ? `$${entry.amount.toFixed(3)}`
        : entry.amount >= 1000 ? fmt.krwC(entry.amount) : `${entry.amount.toFixed(0)}원`;
      return h('div', { class: `div-hist-item${isLatest ? ' is-latest' : ''}` },
        h('div', { class: 'div-hist-ym' },   entry.ym.slice(2).replace('-', '/')),
        h('div', { class: 'div-hist-amt' },   dispAmt),
        h('div', { class: `div-hist-trend ${trend}` }, icon),
      );
    });
    const latest = last8[last8.length - 1];
    const latestDisp = a.currency === 'USD'
      ? `$${latest.amount.toFixed(3)}/주`
      : `${fmt.krw(latest.amount)}/주`;
    return h('div', { class: 'div-ticker-hist' },
      h('div', { class: 'div-ticker-head' },
        h('span', { class: 'div-ticker-title' }, a.name.replace('TIGER ','').replace('KODEX ','')),
        h('span', { class: 'div-ticker-latest' }, latestDisp),
      ),
      h('div', { class: 'div-hist-scroll' }, ...items),
    );
  }).filter(Boolean);

  // 마지막 동기화 시각 표시
  const syncTimeStr = state.divSyncTime
    ? (() => {
        const d = new Date(state.divSyncTime);
        return `${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')} 업데이트됨`;
      })()
    : '동기화 안 됨';

  // 다음 배당 예정 rows (최대 첫 2개 월 그룹)
  const upcomingMonths = [...new Set(upcomingItems.map(x => x.ym))].slice(0, 2);
  const nextDivSection = upcomingItems.length > 0
    ? h('div', { class: 'next-div-section' },
        ...upcomingMonths.map(ym => {
          const group = upcomingItems.filter(x => x.ym === ym);
          const total = group.reduce((s, x) => s + x.a.shares * toKrw(x.expectedAmt, x.a), 0);
          const [y, m] = ym.split('-');
          const label  = ym === `${thisY}-${String(thisM).padStart(2,'0')}` ? '이번 달' : `${m}월`;
          return [
            h('div', { class: 'next-div-label' }, `${label} 예상 배당 · 합계 ${fmt.krwC(total)}`),
            ...group.map(x =>
              h('div', { class: 'next-div-row' },
                h('span', { class: 'next-div-name' },
                  x.a.name.split(' ').pop() + ` (${x.a.shares}주)`,
                  x.confirmed ? h('span', { style: { marginLeft: '4px', fontSize: '10px', color: 'var(--primary)' } }, '확정') : null,
                ),
                h('span', { class: 'next-div-amt' },
                  x.a.currency === 'USD'
                    ? `≈${fmt.krwC(x.a.shares * toKrw(x.expectedAmt, x.a))}`
                    : fmt.krwC(x.a.shares * x.expectedAmt),
                ),
              ),
            ),
          ];
        }).flat(),
      )
    : null;

  setChildren(el,
    // 연간 총합 + 동기화 버튼
    h('div', { class: 'card total-card' },
      h('div', { class: 'div-sync-row' },
        h('div', {},
          h('div', { class: 'card-label' }, '연간 예상 배당금 (원화)'),
          h('div', { class: 'div-sync-status' }, syncTimeStr),
        ),
        h('button', {
          class: 'sync-btn', 'data-action': 'sync-dividends',
          disabled: state.divSyncing,
        }, state.divSyncing ? '⏳...' : '🔄 업데이트'),
      ),
      h('div', { class: 'card-value' }, fmt.krw(annual)),
      h('div', { class: 'card-sub'   }, `월 평균 ${fmt.krwC(monthly)}`),
      nextDivSection,
    ),

    // 이번달 / 다음달 요약
    h('div', { class: 'two-col' },
      h('div', { class: 'card' },
        h('div', { class: 'card-label' }, `이번 달 (${thisM}월)`),
        h('div', { style: { fontSize: '18px', fontWeight: '800', color: 'var(--green)' } }, fmt.krwC(thisMonthTotal)),
        h('div', { class: 'card-sub' },
          assets.filter(a => getEffDivMonths(a).includes(thisM) && getEffDivPerShare(a) > 0).map(a => a.ticker).join(', ') || '해당없음',
        ),
      ),
      h('div', { class: 'card' },
        h('div', { class: 'card-label' }, `다음 달 (${nextM}월)`),
        h('div', { style: { fontSize: '18px', fontWeight: '800', color: 'var(--green)' } }, fmt.krwC(nextMonthTotal)),
        h('div', { class: 'card-sub' },
          assets.filter(a => getEffDivMonths(a).includes(nextM) && getEffDivPerShare(a) > 0).map(a => a.ticker).join(', ') || '해당없음',
        ),

function syncGoalResult() {
  const el = $id('goal-result');
  if (!el || !state.portfolio) return;

  const { assets, total_value } = state.portfolio;
  const targetMonthly = state.goalAmount;
  if (!targetMonthly || targetMonthly <= 0) return;

  let weightedYield = 0;
  assets.forEach(a => {
    if (a.price > 0 && a.div_per_share > 0 && a.div_months.length > 0) {
      weightedYield += (a.target_pct / 100) * (a.div_per_share * a.div_months.length / a.price);
    }
  });

  if (weightedYield <= 0) {
    setChildren(el,
      h('div', { class: 'card', style: { textAlign: 'center', color: 'var(--muted)', fontSize: '13px', padding: '24px' } },
        '⚙️ 설정 탭에서 주당 배당금을 입력해주세요.',
      ),
    );
    el.classList.remove('hidden');
    return;
  }

  const targetAnnual    = targetMonthly * 12;
  const currentAnnual   = assets.reduce((s, a) => s + a.shares * a.div_per_share * a.div_months.length, 0);
  const currentMonthly  = currentAnnual / 12;
  const requiredTotal   = targetAnnual / weightedYield;
  const additionalNeeded = Math.max(0, requiredTotal - total_value);
  const progressPct     = Math.min(total_value / requiredTotal * 100, 100);

  setChildren(el,
    h('div', { class: 'card total-card' },
      h('div', { class: 'card-label' }, '목표 월 배당금'),
      h('div', { class: 'card-value' }, fmt.krw(targetMonthly)),
      h('div', { class: 'card-sub'   }, `연 ${fmt.krwC(targetAnnual)}`),
    ),
    h('div', { class: 'card' },
      h('div', { class: 'card-label', style: { marginBottom: '10px' } }, `달성률 ${progressPct.toFixed(1)}%`),
      h('div', { style: { background: 'var(--border)', borderRadius: '8px', height: '14px', overflow: 'hidden', marginBottom: '16px' } },
        h('div', { style: { height: '100%', width: `${progressPct}%`, background: 'linear-gradient(90deg,var(--green),var(--primary))', borderRadius: '8px', transition: 'width 0.6s' } }),
      ),
      h('div', { class: 'goal-row' }, h('div', { class: 'goal-label' }, '현재 총 자산'),             h('div', { class: 'goal-value' }, fmt.krwC(total_value))),
      h('div', { class: 'goal-row' }, h('div', { class: 'goal-label' }, '현재 월 배당금 (평균)'),    h('div', { class: 'goal-value', style: { color: 'var(--green)'   } }, fmt.krw(currentMonthly))),
      h('div', { class: 'divider' }),
      h('div', { class: 'goal-row' }, h('div', { class: 'goal-label' }, '목표 달성 필요 총 자산'),   h('div', { class: 'goal-value', style: { color: 'var(--primary)' } }, fmt.krwC(requiredTotal))),
      h('div', { class: 'goal-row' },
        h('div', { class: 'goal-label' }, '추가 필요 자산'),
        h('div', { class: 'goal-value', style: { color: additionalNeeded > 0 ? 'var(--red)' : 'var(--green)' } },
          additionalNeeded > 0 ? fmt.krwC(additionalNeeded) : '목표 달성! 🎉',
        ),
      ),
      h('div', { class: 'goal-row' }, h('div', { class: 'goal-label' }, '포트폴리오 가중 배당수익률'), h('div', { class: 'goal-value' }, `${(weightedYield * 100).toFixed(2)}%`)),
    ),
  );
  el.classList.remove('hidden');
}

  );

  // 실시간 합계 표시 (입력 시 갱신, 리스너 중복 방지)
  if (!el._hasPctListener) {
    el.addEventListener('input', () => {
      const total   = $id('pct-total');
      if (!total) return;
      const inputs  = el.querySelectorAll('.pct-input');
      const sum     = Array.from(inputs).reduce((s, inp) => s + (parseFloat(inp.value) || 0), 0);

      total.className   = `total-indicator ${ok ? 'total-ok' : 'total-ng'}`;
    });
    el._hasPctListener = true;
  }
}

// Yahoo Finance에서 최근 2년 배당 기록 가져오기
async function fetchDividendHistory(ticker) {
  const isKR   = /^\d/.test(ticker);
  const yTicker = isKR ? ticker + '.KS' : ticker.toUpperCase();
  try {
    const res = await fetch(
      `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(yTicker)}?events=div&range=2y&interval=1mo`,
      { signal: AbortSignal.timeout(6000) }
    );
    if (!res.ok) return null;
    const data = await res.json();
    const divs = data.chart?.result?.[0]?.events?.dividends;
    if (!divs) return null;
    return Object.values(divs)
      .map(d => {
        const dt   = new Date(d.date * 1000);
        const ym   = `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}`;
        const date = `${ym}-${String(dt.getDate()).padStart(2, '0')}`;
        return { ym, date, amount: d.amount, source: 'auto' };
      })
      .sort((a, b) => a.date.localeCompare(b.date));
  } catch {
    return null;
  }
}

// 기존 기록과 새로 가져온 기록을 병합 (수동 입력은 유지, date 필드 보존)
function mergeHistory(existing = [], fetched = []) {
  const map = {};
  existing.forEach(e => { map[e.ym] = e; });
  fetched.forEach(f => {
    if (!map[f.ym] || map[f.ym].source !== 'manual') {
      map[f.ym] = { ...map[f.ym], ...f };  // date 포함 모든 필드 갱신
    } else if (!map[f.ym].date && f.date) {
      map[f.ym] = { ...map[f.ym], date: f.date };  // 수동 기록에도 date 보완
    }
  });
  return Object.values(map).sort((a, b) => (a.date || a.ym).localeCompare(b.date || b.ym));
}

// 전체 종목 배당 기록 동기화 (GAS 프록시를 통해 Yahoo Finance 호출 — 브라우저 CORS 우회)
async function syncDividends(silent = false) {
  const assets = state.portfolio?.assets;
  if (!assets || state.divSyncing) return;
  setState({ divSyncing: true });
  if (!silent) showToast('🔄 배당 기록 조회 중...', 60000);

  const history = { ...state.divHistory };
  let updated = 0;

  try {
    const tickers = assets.map(a => a.ticker);
    const result  = await api._get('getDividends', tickers);
    if (result) {
      for (const [ticker, fetched] of Object.entries(result)) {
        if (!fetched || fetched.length === 0) continue;
        history[ticker] = mergeHistory(history[ticker] || [], fetched);
        updated++;
      }
    }
  } catch(e) {
    console.error('[syncDividends]', e);
  }

  const now = new Date().toISOString();
  localStorage.setItem('divHistory', JSON.stringify(history));
  localStorage.setItem('divSyncTime', now);
  setState({ divHistory: history, divSyncTime: now, divSyncing: false });

  if (!silent) showToast(updated > 0 ? `✅ ${updated}개 종목 배당 기록 업데이트됨` : '⚠️ 데이터를 가져오지 못했습니다.', 3000);
}

// divHistory에서 특정 종목의 최신 주당 배당금 반환 (없으면 GAS 값 fallback)
function getEffDivPerShare(a) {
  const hist = state.divHistory[a.ticker];
  if (hist && hist.length > 0) return hist[hist.length - 1].amount;
  return a.div_per_share || 0;
}

// divHistory에서 배당 지급 월 목록 추출 (없으면 GAS div_months fallback)
function getEffDivMonths(a) {
  const hist = state.divHistory[a.ticker];
  if (hist && hist.length > 0) {
    const months = [...new Set(hist.map(h => parseInt(h.ym.split('-')[1])))].sort((x, y) => x - y);
    if (months.length > 0) return months;
  }
  return a.div_months || [];
}

// KRW 환산 (USD 자산은 환율 적용)
function toKrw(amount, asset) {
  return asset.currency === 'USD' ? amount * (state.portfolio?.usdkrw || 1350) : amount;
}

// ════════════════════════════════════════════════════════════════
// BUSINESS LOGIC
// ════════════════════════════════════════════════════════════════
// ── 자동 배당 재투자 (지급일 기준, 종목별) ───────────────────────
async function applyDivReinvestment() {
  const assets = state.portfolio?.assets;
  if (!assets?.length) return;

  const today = new Date().toISOString().slice(0, 10);  // "YYYY-MM-DD"
  const log   = { ...state.divReinvestLog };            // 종목별 마지막 처리 날짜
  const reinvestUpdates = [];
  const toastLines = [];

  for (const a of assets) {
    const hist = state.divHistory[a.ticker];
    if (!hist?.length) continue;

    // date 필드가 있는 기록 중, 오늘 이전이고 아직 미처리인 것들
    const lastDone = log[a.ticker] || '0000-00-00';
    const pending = hist.filter(h => h.date && h.date <= today && h.date > lastDone);
    if (pending.length === 0) continue;

    // 각 미처리 배당을 순서대로 합산 (대부분 1개)
    let totalDivKrw = 0;
    for (const rec of pending) {
      totalDivKrw += a.shares * toKrw(rec.amount, a);
    }

    if (totalDivKrw <= 0 || !a.price) continue;

    const newShares = Math.floor(totalDivKrw / a.price);
    const latestDate = pending[pending.length - 1].date;
    log[a.ticker] = latestDate;  // 처리 완료 날짜 갱신

    if (newShares <= 0) continue;

    reinvestUpdates.push({ ticker: a.ticker, addShares: newShares });
    toastLines.push(`${a.name}: +${newShares}주 (${latestDate})`);
  }

  // 처리 날짜 로그 저장
  localStorage.setItem('divReinvestLog', JSON.stringify(log));
  setState({ divReinvestLog: log });

  if (reinvestUpdates.length === 0) return;

  try {
    await api.updateHoldings(reinvestUpdates);
    showToast('💰 배당 재투자 완료\n' + toastLines.join('\n'), 5000);
    await fetchPortfolio();
  } catch (e) {
    showToast('❌ 배당 재투자 업데이트 실패: ' + e.message, 4000);
  }
}

async function fetchPortfolio() {
  if (state.loading) return;
  setState({ loading: true, error: null });
  try {
    let portfolio = await api.getPortfolio();

    // ① GAS userData에서 totalCashInvested 동기화 (GAS → 앱)
    if (portfolio.userData?.totalCashInvested !== undefined) {
      const gasVal = Number(portfolio.userData.totalCashInvested) || 0;
      // GAS 값이 있거나 로컬에 값이 없으면 GAS 값 사용
      if (gasVal > 0 || !state.totalCashInvested) {
        localStorage.setItem('totalCashInvested', String(gasVal));
        state.totalCashInvested = gasVal; // patch 후 setState에서 반영
      }
    }

    // ② GAS assets의 avg_price를 customPortfolio에 반영
    if (portfolio.assets) {
      const gasAvgMap = {};
      portfolio.assets.forEach(a => { if (a.avg_price) gasAvgMap[a.ticker] = a.avg_price; });

      let cp = state.customPortfolio;
      if (cp && Object.keys(gasAvgMap).length > 0) {
        cp = cp.map(r => ({
          ...r,
          avg_price: gasAvgMap[r.ticker] ?? r.avg_price ?? 0,
        }));
        localStorage.setItem('customPortfolio', JSON.stringify(cp));
        state.customPortfolio = cp;
      }
    }

    // ③ 커스텀 포트폴리오 오버라이드 (target_pct, name, avg_price)
    portfolio = applyCustomPortfolio(portfolio);

    // ④ 이름: KR_NAMES(내장 맵) 우선 → GAS Config 시트 → nameCache 순
    //    GAS가 Config 시트 이름을 그대로 반환하므로 nameCache에는 저장하지 않음
    //    (이전에 깨진 이름이 캐시에 남아있을 수 있으므로 KR_NAMES로 덮어씀)
    portfolio.assets = portfolio.assets.map(a => ({
      ...a,
      name: KR_NAMES[a.ticker] || a.name,
    }));

    setState({ portfolio, loading: false, totalCashInvested: state.totalCashInvested });

    // ⑤ 백그라운드: 캐시 없는 종목(GAS 없는 종목) 이름 Yahoo Finance 조회
    const allTickers = [
      ...portfolio.assets.map(a => a.ticker),
      ...(state.customPortfolio || []).map(r => r.ticker),
    ];
    const toLookup = [...new Set(allTickers)].filter(t => !nameCache[t]);
    if (toLookup.length > 0) {
      Promise.all(toLookup.map(t => lookupStockName(t))).then(() => {
        if (!state.portfolio) return;
        const enriched = state.portfolio.assets.map(a => ({
          ...a,
          name: nameCache[a.ticker] || a.name,
        }));
        const updatedCp = state.customPortfolio?.map(r => ({
          ...r,
          name: nameCache[r.ticker] || r.name,
        }));
        if (updatedCp) localStorage.setItem('customPortfolio', JSON.stringify(updatedCp));
        setState({
          portfolio: { ...state.portfolio, assets: enriched },
          ...(updatedCp ? { customPortfolio: updatedCp } : {}),
        });
      });
    }
  } catch (e) {
    setState({ loading: false, error: e.message });
  }
}

async function saveHoldings() {
  if (!state.gasUrl) { showToast('먼저 GAS URL을 저장해주세요.'); return; }
  const assets = state.portfolio?.assets?.length ? state.portfolio.assets : DEFAULT_ASSETS;

  // shares + avg_price 모두 GAS에 전송
  const updates = assets.map(a => ({
    ticker:    a.ticker,
    shares:    parseFloat($id(`shares-${a.ticker}`)?.value) || 0,
    avg_price: parseFloat($id(`havg-${a.ticker}`)?.value)   || 0,
  }));

  // customPortfolio 로컬에도 동기화
  const cp = (state.customPortfolio || assets.map(a => ({
    ticker:     a.ticker,
    name:       nameCache[a.ticker] || a.name,
    target_pct: a.target_pct || 0,
    avg_price:  0,
  }))).map(r => ({
    ...r,
    avg_price: parseFloat($id(`havg-${r.ticker}`)?.value ?? r.avg_price) || 0,
  }));
  localStorage.setItem('customPortfolio', JSON.stringify(cp));
  setState({ customPortfolio: cp });

  try {
    // GAS Holdings 시트에 shares + avg_price 저장
    await api.setHoldings(updates);
    showToast('✅ 수량 · 단가가 저장됐습니다.');
    await fetchPortfolio();
  } catch (e) {
    showToast('❌ 저장 실패: ' + e.message, 4000);
  }
}

async function saveTotalCash() {
  const val = parseFloat($id('total-cash-invested-input')?.value) || 0;
  localStorage.setItem('totalCashInvested', String(val));
  setState({ totalCashInvested: val });

  // GAS UserData 시트에도 저장
  if (state.gasUrl) {
    try {
      await api.saveUserData({ totalCashInvested: val });
      showToast('✅ 총 입금액이 저장됐습니다.');
    } catch (e) {
      showToast('⚠️ 로컬 저장 완료 (GAS 저장 실패: ' + e.message + ')', 4000);
    }
  } else {
    showToast('✅ 총 입금액이 저장됐습니다. (로컬)');
  }
}

async function saveGasUrl() {
  const url = $id('gas-url-input')?.value.trim();
  if (!url) { showToast('URL을 입력해주세요.'); return; }
  state.gasUrl = url; // setState 안 쓰는 이유: fetchPortfolio가 setState 호출함
  localStorage.setItem('gasUrl', url);
  showToast('✅ URL 저장됨. 데이터를 불러옵니다...');
  await fetchPortfolio();
}

async function saveDivSettings() {
  if (!state.gasUrl) { showToast('먼저 GAS URL을 저장해주세요.'); return; }
  const assets  = state.portfolio?.assets?.length ? state.portfolio.assets : DEFAULT_ASSETS;
  const updates = assets.map(a => ({
    ticker:        a.ticker,
    div_per_share: parseFloat($id(`div-${a.ticker}`)?.value) || 0,
    currency:      $id(`cur-${a.ticker}`)?.value || 'KRW',
    div_months:    Array.from({ length: 12 }, (_, i) => i + 1).filter(m => $id(`dm-${a.ticker}-${m}`)?.checked),
  }));

  try {
    await api.updateConfig(updates);
    showToast('✅ 배당 설정이 저장됐습니다.');
    await fetchPortfolio();
  } catch (e) {
    showToast('❌ 저장 실패: ' + e.message, 4000);
  }
}

function getPortfolioRowsFromDOM() {
  const cp = state.customPortfolio ||
    (state.portfolio?.assets || DEFAULT_ASSETS).map(a => ({
      ticker:     a.ticker,
      name:       nameCache[a.ticker] || a.name,
      target_pct: a.target_pct || 0,
      avg_price:  a.avg_price  || 0,
    }));
  return cp.map(r => ({
    ...r,
    name:       nameCache[r.ticker] || r.name || r.ticker,
    target_pct: parseFloat($id(`tgt-${r.ticker}`)?.value ?? r.target_pct) || 0,
    avg_price:  r.avg_price || 0,
  }));
}

function savePortfolioSettings() {
  const cp = getPortfolioRowsFromDOM();
  const totalPct = cp.reduce((s, r) => s + r.target_pct, 0);
  if (Math.abs(totalPct - 100) > 0.5) {
    showToast(`⚠️ 합계 ${totalPct.toFixed(1)}% — 100%가 되어야 합니다.`, 3000);
    return;
  }
  localStorage.setItem('customPortfolio', JSON.stringify(cp));
  setState({ customPortfolio: cp });

  // GAS에도 target_pct 전송 시도 (GAS가 지원하면 서버에도 반영)
  if (state.gasUrl && state.portfolio) {
    api.updateConfig(cp.map(r => ({ ticker: r.ticker, target_pct: r.target_pct }))).catch(() => {});
  }

  // 현재 portfolio.assets에 target_pct 즉시 반영
  if (state.portfolio) {
    const assets = state.portfolio.assets.map(a => {
      const custom = cp.find(c => c.ticker === a.ticker);
      return custom ? { ...a, target_pct: custom.target_pct, name: custom.name || a.name } : a;
    });
    setState({ portfolio: { ...state.portfolio, assets } });
  }

  showToast('✅ 포트폴리오 구성이 저장됐습니다.');
}

async function addTicker() {
  const input  = $id('new-ticker-input');
  const ticker = input?.value.trim().toUpperCase();
  if (!ticker) { showToast('티커를 입력해주세요.'); return; }

  const cp = getPortfolioRowsFromDOM();
  if (cp.some(r => r.ticker === ticker)) {
    showToast('이미 추가된 종목입니다.');
    return;
  }

  showToast('🔍 종목명 조회 중...', 2000);
  const lookedUpName = await lookupStockName(ticker);
  const name = lookedUpName || ticker;

  cp.push({ ticker, name, target_pct: 0, avg_price: 0 });
  localStorage.setItem('customPortfolio', JSON.stringify(cp));
  setState({ customPortfolio: cp });
  if (input) input.value = '';

  if (lookedUpName) {
    showToast(`✅ ${lookedUpName}`);
  } else {
    showToast(`⚠️ 종목명을 찾지 못했습니다 (티커로 표시)`, 3000);
  }
}

function removeTicker(idx) {
  const cp = getPortfolioRowsFromDOM();
  cp.splice(Number(idx), 1);
  localStorage.setItem('customPortfolio', JSON.stringify(cp));
  setState({ customPortfolio: cp });
}

function computePlan(assets, totalValue, budget) {
  const newTotal = totalValue + budget;
  const items    = assets.map(a => ({
    ...a,
    gap:          Math.max(0, a.target_pct / 100 * newTotal - a.value),
    sharesToBuy:  0,
    buyAmountKRW: 0,
  }));

  const totalGap = items.reduce((s, i) => s + i.gap, 0);
  const scale    = totalGap > budget ? budget / totalGap : 1;
  let remaining  = budget;

  // 1차: 비례 배분 floor
  items.forEach(item => {
    if (item.price <= 0) return;
    const shares       = Math.floor(item.gap * scale / item.price);
    item.sharesToBuy   = shares;
    item.buyAmountKRW  = shares * item.price;
    remaining         -= item.buyAmountKRW;
  });

  // 2차: 잔여 현금으로 가장 부족한 종목 1주씩 추가 (greedy)
  let changed = true;
  while (changed && remaining > 0) {
    changed = false;
    let bestItem = null, bestDist = -Infinity;
    for (const item of items) {
      if (item.price <= 0 || item.price > remaining) continue;
      const newPct = (item.value + item.buyAmountKRW + item.price) / newTotal * 100;
      const dist   = item.target_pct - newPct;
      if (dist > bestDist) { bestDist = dist; bestItem = item; }
    }
    if (bestItem && bestDist > -0.5) {
      bestItem.sharesToBuy++;
      bestItem.buyAmountKRW += bestItem.price;
      remaining -= bestItem.price;
      changed = true;
    }
  }

  const actualSpent    = budget - remaining;
  const actualNewTotal = totalValue + actualSpent;
  items.forEach(item => {
    item.newValue = item.value + item.buyAmountKRW;
    item.newPct   = actualNewTotal > 0 ? item.newValue / actualNewTotal * 100 : 0;
  });

  return { items, remaining, actualSpent, newTotal: actualNewTotal };
}

async function applyPurchase() {
  const { rbPlan } = state;
  if (!rbPlan) return;

  const updates = rbPlan.items
    .filter(i => i.sharesToBuy > 0)
    .map(i => ({ ticker: i.ticker, addShares: i.sharesToBuy }));
  if (!updates.length) return;

  const btn = $id('apply-btn');
  if (btn) { btn.disabled = true; btn.textContent = '저장 중...'; }

  try {
    await api.updateHoldings(updates);
    showToast('✅ 매수 완료! 포트폴리오가 업데이트됐습니다.');
    setState({ rbPlan: null, activeTab: 'home' });
    await fetchPortfolio();
  } catch (e) {
    showToast('❌ 저장 실패: ' + e.message, 4000);
    if (btn) { btn.disabled = false; btn.textContent = '✅ 이대로 매수 완료 — 포트폴리오에 반영'; }
  }
}

// ════════════════════════════════════════════════════════════════
// EVENT DELEGATION — 단일 리스너로 모든 클릭 처리
// ════════════════════════════════════════════════════════════════
$id('app').addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;

  switch (btn.dataset.action) {

    case 'tab':
      setState({ activeTab: btn.dataset.tab });
      break;

    case 'toggle-theme': {
      const isLight = document.documentElement.dataset.theme === 'light';
      const next = isLight ? 'dark' : 'light';
      document.documentElement.dataset.theme = next;
      localStorage.setItem('theme', next);
      $id('theme-toggle').textContent = next === 'light' ? '☀️' : '🌙';
      break;
    }

    case 'refresh':
      fetchPortfolio();
      break;

    case 'go-settings':
      setState({ activeTab: 'settings' });
      break;

    case 'rb-preset': {
      const v = Number(btn.dataset.value);
      const plan = state.portfolio
        ? computePlan(state.portfolio.assets, state.portfolio.total_value, v)
        : null;
      setState({ rbAmount: v, rbPlan: plan });
      break;
    }

    case 'calc-rebalance': {
      const amount = parseFloat($id('rb-amount')?.value);
      if (!amount || amount <= 0) { showToast('투자금액을 입력해주세요.'); break; }
      const plan = computePlan(state.portfolio.assets, state.portfolio.total_value, amount);
      setState({ rbAmount: amount, rbPlan: plan });
      break;
    }

    case 'goal-preset': {
      const v = Number(btn.dataset.value);
      setState({ goalAmount: v });
      break;
    }

    case 'calc-goal': {
      const amount = parseFloat($id('goal-amount')?.value);
      if (!amount || amount <= 0) break;
      setState({ goalAmount: amount });
      break;
    }

    case 'apply-purchase':
      applyPurchase();
      break;

    case 'save-holdings':
      saveHoldings();
      break;

    case 'save-total-cash':
      saveTotalCash();
      break;

    case 'save-gas-url':
      saveGasUrl();
      break;

    case 'save-div-settings':
      saveDivSettings();
      break;

    case 'save-portfolio':
      savePortfolioSettings();
      break;

    case 'add-ticker':
      addTicker();
      break;

    case 'remove-ticker':
      removeTicker(btn.dataset.idx);
      break;

    case 'sync-dividends':
      syncDividends(false);
      break;
  }
});

// ════════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════════
// 저장된 테마 복원
(function() {
  const t = localStorage.getItem('theme') || 'dark';
  if (t === 'light') {
    document.documentElement.dataset.theme = 'light';
    const btn = $id('theme-toggle');
    if (btn) btn.textContent = '☀️';
  }
})();

render();
if (state.gasUrl) {
  fetchPortfolio().then(async () => {
    // 자동 배당 재투자 (월 1회)
    await applyDivReinvestment();
    // 마지막 동기화 후 6시간 이상 지났으면 자동 재동기화
    const lastSync = state.divSyncTime ? new Date(state.divSyncTime) : null;
    const hoursSince = lastSync ? (Date.now() - lastSync.getTime()) / 3_600_000 : Infinity;
    if (hoursSince >= 6) syncDividends(true);
  });
}
